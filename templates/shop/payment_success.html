{% extends 'base.html' %}

{% block title %}Payment Successful | Rara Jewels{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card shadow-lg border-0 rounded-4 p-5 text-center">

        <div class="mb-4">
            <h1 class="text-success">✅ Payment Successful</h1>

            <p class="text-muted">
                Thank you for shopping with
                <strong>Rara Jewels</strong>
            </p>
        </div>

        <hr>

        <div class="my-3">
            <h5>Order Number</h5>
            <h4>{{ order.order_number }}</h4>
        </div>

        <div class="my-3">
            <h5>Amount Paid</h5>
            <h2 class="text-success">
                ₹{{ order.total_price }}
            </h2>
        </div>

        <div class="mt-4">

            <a href="{% url 'accounts:dashboard' %}"
               class="btn btn-dark">
                My Orders
            </a>

            <a href="{% url 'shop:products' %}"
               class="btn btn-warning ms-2">
                Continue Shopping
            </a>

        </div>

    </div>

</div>

<!-- Meta Pixel Purchase Event -->
<script>
fbq('track', 'Purchase', {
    value: {{ purchase_value }},
    currency: 'INR'
});
</script>

{% endblock %}
